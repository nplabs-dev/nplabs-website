<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="IL_TUO_CODICE_DI_PLAY_CONSOLE" />
    <meta name="google-site-verification" content="JMaPIYo9giVvBMekQqXjCIuxRN4DMYMxaTty5PXRXSs" />
  
    <title>NP LABS | Experimental Game Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Sfondo Tech Astratto statico (senza immagini esterne) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(141, 2, 31, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.8) 0%, transparent 50%),
                linear-gradient(rgba(18, 18, 18, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 18, 0.4) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 20px 20px, 20px 20px;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        /* Logo NP LABS integrato in formato vettoriale */
        .logo-container {
            width: 280px;
            margin: 0 auto 2.5rem auto;
            filter: drop-shadow(0 0 15px rgba(141, 2, 31, 0.3));
        }
        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #8d021f; /* Il rosso del tuo logo */
            margin-bottom: 1rem;
            font-weight: 700;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #b3b3b3;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        .status-badge {
            display: inline-block;
            border: 1px solid rgba(141, 2, 31, 0.5);
            background: rgba(141, 2, 31, 0.05);
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3355;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(141, 2, 31, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 250" width="100%" height="100%">
                <rect x="25" y="25" width="220" height="170" fill="#8d021f" stroke="#000000" stroke-width="12"/>
                <path d="M70,110 C70,85 90,70 135,70 C180,70 200,85 200,110 C200,135 190,160 180,160 C170,160 165,145 135,145 C105,145 100,160 90,160 C80,160 70,135 70,110 Z" fill="#ffffff"/>
                <polygon points="100,102 108,102 108,94 116,94 116,102 124,102 124,110 116,110 116,118 108,118 108,110 100,110" fill="#8d021f"/>
                <circle cx="154" cy="114" r="7" fill="#8d021f"/>
                <circle cx="170" cy="114" r="7" fill="#8d021f"/>
                <circle cx="162" cy="100" r="7" fill="#8d021f"/>
                <circle cx="162" cy="128" r="7" fill="#8d021f"/>
                
                <text x="275" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="92" font-weight="900" fill="#ffffff" letter-spacing="2">NP</text>
                <text x="275" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="3">LABS</text>
            </svg>
        </div>

        <h2>Welcome</h2>
        <p>We are an independent creative studio focused on crafting thoughtful and unconventional digital experiences. Our work explores new interaction models and prioritizes quality, originality, and meaningful engagement over mass-market trends.</p>
        
        <div class="status-badge">
            System Online // Experiencing core deployment
        </div>
    </div>

</body>
</html>
